name: Build and publish Docker images

on:
  push:
    tags:
      # 4-digit format: v{n8n_major}.{n8n_minor}.{n8n_patch}.{addon_build}
      - "v*.*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Full version to build (e.g. 2.16.1.4)"
        required: true

jobs:
  build-and-push:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract versions
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FULL="${GITHUB_REF#refs/tags/v}"
          else
            FULL="${{ github.event.inputs.version }}"
          fi
          # N8N_VERSION = first 3 digits (e.g. 2.16.1.4 → 2.16.1)
          N8N=$(echo "$FULL" | cut -d. -f1-3)
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "n8n=$N8N"   >> $GITHUB_OUTPUT
          echo "Full addon version: $FULL"
          echo "n8n version to install: $N8N"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v5
        with:
          context: ./n8n
          file: ./n8n/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            N8N_VERSION=${{ steps.version.outputs.n8n }}
          tags: |
            ghcr.io/momohteks/hassio-n8n-${{ matrix.arch }}:${{ steps.version.outputs.full }}
            ghcr.io/momohteks/hassio-n8n-${{ matrix.arch }}:${{ steps.version.outputs.n8n }}
            ghcr.io/momohteks/hassio-n8n-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FULL="${GITHUB_REF#refs/tags/v}"
          else
            FULL="${{ github.event.inputs.version }}"
          fi
          N8N=$(echo "$FULL" | cut -d. -f1-3)
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "n8n=$N8N"   >> $GITHUB_OUTPUT

      - name: Extract changelog notes
        id: changelog
        run: |
          FULL="${{ steps.version.outputs.full }}"
          NOTES=$(awk "/^## ${FULL}/,/^## [0-9]/" n8n/CHANGELOG.md | head -n -1 | tail -n +2)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "${NOTES}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.full }}
          name: Addon ${{ steps.version.outputs.full }} (n8n ${{ steps.version.outputs.n8n }})
          body: |
            ## hassio-n8n addon ${{ steps.version.outputs.full }}
            Ships **n8n ${{ steps.version.outputs.n8n }}**.

            ${{ steps.changelog.outputs.notes }}

            ### Docker images

            | Architecture | Full tag | n8n tag (floating) |
            |---|---|---|
            | amd64 | `ghcr.io/momohteks/hassio-n8n-amd64:${{ steps.version.outputs.full }}` | `...:${{ steps.version.outputs.n8n }}` |
            | aarch64 | `ghcr.io/momohteks/hassio-n8n-aarch64:${{ steps.version.outputs.full }}` | `...:${{ steps.version.outputs.n8n }}` |

            ### Installation

            Add this repository in Home Assistant:
            ```
            https://github.com/momohteks/hassio-n8n
            ```
          draft: false
          prerelease: false
