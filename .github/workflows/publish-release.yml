name: Build et publication des images Docker

on:
  push:
    tags:
      # Format 4-digits : v{n8n_major}.{n8n_minor}.{n8n_patch}.{addon_build}
      - "v*.*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version complète à builder (ex: 2.16.1.4)"
        required: true

jobs:
  build-and-push:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          # aarch64 temporairement désactivé — voir n8n/config.yaml et CLAUDE.md

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Extraire les versions
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FULL="${GITHUB_REF#refs/tags/v}"
          else
            FULL="${{ github.event.inputs.version }}"
          fi
          # N8N_VERSION = 3 premiers digits (ex : 2.16.1.4 → 2.16.1)
          N8N=$(echo "$FULL" | cut -d. -f1-3)
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "n8n=$N8N"   >> $GITHUB_OUTPUT
          echo "Version addon complète : $FULL"
          echo "Version n8n à installer : $N8N"

      - name: Login sur ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push image ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: ./n8n
          file: ./n8n/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            N8N_VERSION=${{ steps.version.outputs.n8n }}
          tags: |
            ghcr.io/momohteks/hassio-n8n-${{ matrix.arch }}:${{ steps.version.outputs.full }}
            ghcr.io/momohteks/hassio-n8n-${{ matrix.arch }}:${{ steps.version.outputs.n8n }}
            ghcr.io/momohteks/hassio-n8n-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  create-release:
    name: Créer la GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Extraire la version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FULL="${GITHUB_REF#refs/tags/v}"
          else
            FULL="${{ github.event.inputs.version }}"
          fi
          N8N=$(echo "$FULL" | cut -d. -f1-3)
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "n8n=$N8N"   >> $GITHUB_OUTPUT

      - name: Extraire les notes de changelog
        id: changelog
        run: |
          FULL="${{ steps.version.outputs.full }}"
          NOTES=$(awk "/^## ${FULL}/,/^## [0-9]/" n8n/CHANGELOG.md | head -n -1 | tail -n +2)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "${NOTES}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Créer la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.full }}
          name: Addon ${{ steps.version.outputs.full }} (n8n ${{ steps.version.outputs.n8n }})
          body: |
            ## Addon hassio-n8n ${{ steps.version.outputs.full }}
            Embarque **n8n ${{ steps.version.outputs.n8n }}**.

            ${{ steps.changelog.outputs.notes }}

            ### Images Docker

            | Architecture | Tag complet | Tag n8n (flottant) |
            |---|---|---|
            | amd64 | `ghcr.io/momohteks/hassio-n8n-amd64:${{ steps.version.outputs.full }}` | `...:${{ steps.version.outputs.n8n }}` |

            > aarch64 temporairement désactivé.

            ### Installation

            Ajoutez ce dépôt dans Home Assistant :
            ```
            https://github.com/momohteks/hassio-n8n
            ```
          draft: false
          prerelease: false
