name: Build et publication des images Docker

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version à builder (ex: 2.16.1)"
        required: true

jobs:
  build-and-push:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Extraire la version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag git : v2.16.1 → 2.16.1
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version : ${VERSION}"

      - name: Login sur ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push image ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: ./n8n
          file: ./n8n/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            N8N_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/momohteks/hassio-n8n-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/momohteks/hassio-n8n-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  create-release:
    name: Créer la GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Extraire la version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Extraire les notes de changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extraire le bloc du CHANGELOG pour cette version
          NOTES=$(awk "/^## ${VERSION}/,/^## [0-9]/" n8n/CHANGELOG.md | head -n -1 | tail -n +2)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "${NOTES}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Créer la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: n8n ${{ steps.version.outputs.version }}
          body: |
            ## n8n ${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.notes }}

            ### Images Docker

            | Architecture | Image |
            |---|---|
            | amd64 | `ghcr.io/momohteks/hassio-n8n-amd64:${{ steps.version.outputs.version }}` |
            | aarch64 | `ghcr.io/momohteks/hassio-n8n-aarch64:${{ steps.version.outputs.version }}` |

            ### Installation

            Ajoutez ce dépôt dans Home Assistant :
            ```
            https://github.com/momohteks/hassio-n8n
            ```
          draft: false
          prerelease: false
