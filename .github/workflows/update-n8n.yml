name: Mise à jour version addon

on:
  schedule:
    # Chaque jour à 6h UTC : vérifie si une nouvelle version n8n est dispo
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode de mise à jour"
        type: choice
        required: true
        default: "auto"
        options:
          - auto           # check upstream n8n, maj si nouvelle version
          - rebuild_only   # bump uniquement le 4ème digit (pas de maj n8n)

jobs:
  update:
    name: Calcul et application de la nouvelle version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Lire la version actuelle
        id: current
        run: |
          CURRENT=$(grep '^version:' n8n/config.yaml | sed 's/version: *"//; s/"//')
          CURRENT_N8N=$(echo "$CURRENT" | cut -d. -f1-3)
          CURRENT_BUILD=$(echo "$CURRENT" | cut -d. -f4)
          if [ -z "$CURRENT_BUILD" ]; then CURRENT_BUILD=0; fi
          echo "full=$CURRENT"         >> $GITHUB_OUTPUT
          echo "n8n=$CURRENT_N8N"      >> $GITHUB_OUTPUT
          echo "build=$CURRENT_BUILD"  >> $GITHUB_OUTPUT
          echo "Version actuelle : $CURRENT (n8n=$CURRENT_N8N, build=$CURRENT_BUILD)"

      - name: Calculer la nouvelle version
        id: next
        run: |
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          CURRENT_N8N="${{ steps.current.outputs.n8n }}"
          CURRENT_BUILD="${{ steps.current.outputs.build }}"

          if [ "$MODE" = "rebuild_only" ]; then
            # Rebuild manuel : bump 4ème digit uniquement
            NEW_N8N="$CURRENT_N8N"
            NEW_BUILD=$((CURRENT_BUILD + 1))
            REASON="Rebuild manuel (sans changement n8n)"
            UPDATE=true
          else
            # Mode auto : vérifier npm pour nouvelle version n8n
            LATEST_N8N=$(npm view n8n version)
            echo "Dernière version n8n sur npm : $LATEST_N8N"
            if [ "$LATEST_N8N" = "$CURRENT_N8N" ]; then
              echo "Pas de nouvelle version n8n ($CURRENT_N8N). Rien à faire."
              UPDATE=false
            else
              # Nouvelle version n8n → reset build à 1
              NEW_N8N="$LATEST_N8N"
              NEW_BUILD=1
              REASON="Nouvelle version n8n : $CURRENT_N8N → $NEW_N8N"
              UPDATE=true
            fi
          fi

          echo "update=$UPDATE" >> $GITHUB_OUTPUT
          if [ "$UPDATE" = "true" ]; then
            NEW_VERSION="${NEW_N8N}.${NEW_BUILD}"
            echo "version=$NEW_VERSION"  >> $GITHUB_OUTPUT
            echo "n8n=$NEW_N8N"          >> $GITHUB_OUTPUT
            echo "build=$NEW_BUILD"      >> $GITHUB_OUTPUT
            echo "reason=$REASON"        >> $GITHUB_OUTPUT
            echo "Nouvelle version : $NEW_VERSION — $REASON"
          fi

      - name: Mettre à jour config.yaml
        if: steps.next.outputs.update == 'true'
        run: |
          sed -i "s/^version: \".*\"/version: \"${{ steps.next.outputs.version }}\"/" n8n/config.yaml

      - name: Mettre à jour Dockerfile
        if: steps.next.outputs.update == 'true'
        run: |
          sed -i "s/^ARG N8N_VERSION=.*/ARG N8N_VERSION=${{ steps.next.outputs.n8n }}/" n8n/Dockerfile

      - name: Mettre à jour CHANGELOG
        if: steps.next.outputs.update == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ steps.next.outputs.version }}"
          REASON="${{ steps.next.outputs.reason }}"
          ENTRY="## ${VERSION} — ${DATE}\n\n- ${REASON}\n"
          sed -i "1a\\\\n${ENTRY}" n8n/CHANGELOG.md

      - name: Commit et tag
        if: steps.next.outputs.update == 'true'
        run: |
          VERSION="${{ steps.next.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add n8n/config.yaml n8n/Dockerfile n8n/CHANGELOG.md
          git commit -m "chore: bump version vers ${VERSION} — ${{ steps.next.outputs.reason }}"
          git push origin main
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "Tag v${VERSION} créé et poussé → déclenche le build Docker"
