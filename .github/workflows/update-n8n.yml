name: Bump addon version

on:
  schedule:
    # Daily at 06:00 UTC: check whether a new n8n version is available
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        type: choice
        required: true
        default: "auto"
        options:
          - auto           # check upstream npm, bump if new n8n version
          - rebuild_only   # bump only the 4th digit (no n8n change)

jobs:
  update:
    name: Compute and apply the next version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT so the tag push triggers publish-release.yml.
          # GITHUB_TOKEN-driven pushes are intentionally blocked from
          # triggering other workflows (anti-loop protection).
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Read current version
        id: current
        run: |
          CURRENT=$(grep '^version:' n8n/config.yaml | sed 's/version: *"//; s/"//')
          CURRENT_N8N=$(echo "$CURRENT" | cut -d. -f1-3)
          CURRENT_BUILD=$(echo "$CURRENT" | cut -d. -f4)
          if [ -z "$CURRENT_BUILD" ]; then CURRENT_BUILD=0; fi
          echo "full=$CURRENT"         >> $GITHUB_OUTPUT
          echo "n8n=$CURRENT_N8N"      >> $GITHUB_OUTPUT
          echo "build=$CURRENT_BUILD"  >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT (n8n=$CURRENT_N8N, build=$CURRENT_BUILD)"

      - name: Compute next version
        id: next
        run: |
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          CURRENT_N8N="${{ steps.current.outputs.n8n }}"
          CURRENT_BUILD="${{ steps.current.outputs.build }}"

          if [ "$MODE" = "rebuild_only" ]; then
            # Manual rebuild: bump 4th digit only
            NEW_N8N="$CURRENT_N8N"
            NEW_BUILD=$((CURRENT_BUILD + 1))
            REASON="Manual rebuild (no n8n change)"
            UPDATE=true
          else
            # Auto mode: check npm for a newer n8n version
            LATEST_N8N=$(npm view n8n version)
            echo "Latest n8n on npm: $LATEST_N8N"
            if [ "$LATEST_N8N" = "$CURRENT_N8N" ]; then
              echo "No new n8n version ($CURRENT_N8N). Nothing to do."
              UPDATE=false
            else
              # New n8n version → reset build to 1
              NEW_N8N="$LATEST_N8N"
              NEW_BUILD=1
              REASON="New n8n version: $CURRENT_N8N → $NEW_N8N"
              UPDATE=true
            fi
          fi

          echo "update=$UPDATE" >> $GITHUB_OUTPUT
          if [ "$UPDATE" = "true" ]; then
            NEW_VERSION="${NEW_N8N}.${NEW_BUILD}"
            echo "version=$NEW_VERSION"  >> $GITHUB_OUTPUT
            echo "n8n=$NEW_N8N"          >> $GITHUB_OUTPUT
            echo "build=$NEW_BUILD"      >> $GITHUB_OUTPUT
            echo "reason=$REASON"        >> $GITHUB_OUTPUT
            echo "Next version: $NEW_VERSION — $REASON"
          fi

      - name: Update config.yaml
        if: steps.next.outputs.update == 'true'
        run: |
          sed -i "s/^version: \".*\"/version: \"${{ steps.next.outputs.version }}\"/" n8n/config.yaml

      - name: Update Dockerfile
        if: steps.next.outputs.update == 'true'
        run: |
          sed -i "s/^ARG N8N_VERSION=.*/ARG N8N_VERSION=${{ steps.next.outputs.n8n }}/" n8n/Dockerfile

      - name: Update CHANGELOG
        if: steps.next.outputs.update == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ steps.next.outputs.version }}"
          REASON="${{ steps.next.outputs.reason }}"
          ENTRY="## ${VERSION} — ${DATE}\n\n- ${REASON}\n"
          sed -i "1a\\\\n${ENTRY}" n8n/CHANGELOG.md

      - name: Commit and tag
        if: steps.next.outputs.update == 'true'
        run: |
          VERSION="${{ steps.next.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add n8n/config.yaml n8n/Dockerfile n8n/CHANGELOG.md
          git commit -m "chore: bump version to ${VERSION} — ${{ steps.next.outputs.reason }}"
          git push origin main
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "Tag v${VERSION} created and pushed — triggers Docker build"
