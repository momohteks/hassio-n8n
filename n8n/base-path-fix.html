<script>
/* hassio-n8n — HA Ingress compatibility shim.
 *
 * Two fixes, both required, must run BEFORE any other script in the
 * page. This snippet is injected at the very top of <head> by run.sh.
 *
 * ---------------------------------------------------------------------
 * Fix 1 — <base href> for relative URL resolution (since n8n 2.17.5+).
 *
 * n8n 2.17 no longer emits a <base> tag in index.html. When the user
 * opens a workflow, Vue Router pushes the URL to
 *   /api/hassio_ingress/<token>/workflow/<id>
 * so document.baseURI points at /workflow/<id>. Any relative specifier
 * inside a dynamic import (`./assets/X.js`) then resolves to
 *   /api/hassio_ingress/<token>/workflow/assets/X.js
 * which n8n's SPA catch-all answers with index.html (text/html). Vue
 * parses that HTML as JS, inject() receives an undefined key, and the
 * canvas renders blank. Injecting <base href> pins baseURI to the
 * ingress prefix root so every relative URL — dynamic imports, CSS
 * url(), modulepreload — resolves to the correct /assets/* files.
 *
 * ---------------------------------------------------------------------
 * Fix 2 — window.BASE_PATH pin (HA Android companion app).
 *
 * n8n's own /static/base-path.js sets window.BASE_PATH = "/" at
 * DOMContentLoaded inside the HA Android WebView (regular browsers are
 * unaffected). Every subsequent /rest/* XHR then resolves against the
 * page origin instead of the addon, yielding 404 and the "Error
 * connecting to n8n" splash. A getter/setter on window.BASE_PATH
 * rejects any later attempt to overwrite it with "/" or an empty
 * value.
 *
 * ---------------------------------------------------------------------
 * Fix 3 — cache-buster on /rest/workflows/<id> & /rest/active-workflows
 *          (HA Ingress "blank canvas on reopen workflow" bug).
 *
 * Symptom: open a workflow → return to the workflows list → reopen the
 * same (or another) workflow — the editor lands on a blank
 * "My workflow" canvas (URL becomes /workflow/<newAutoId>?new=true)
 * instead of loading the requested workflow.
 *
 * Captured live in DevTools (n8n 2.17.7+ behind HA Ingress):
 *   - 1st GET /rest/workflows/<id>  → 200, JSON workflow data
 *   - 2nd GET /rest/workflows/<id>  → 400, content-type
 *                                    application/octet-stream, 5-byte
 *                                    body, x-served-by header MISSING
 *
 * The frontend reads the 400 as "workflow not found" and redirects to
 * a brand-new empty workflow. Reproducible only via axios's XHR through
 * n8n's interceptor chain — never through plain fetch() in the same
 * tab with the same headers — and only on the SECOND visit, never the
 * first. We confirmed:
 *   - it's NOT a conditional-GET race (still happens with ETag stripped
 *     and Cache-Control: no-store forced from nginx);
 *   - it's NOT the n8n auth middleware (validateBrowserId neutralized
 *     since 2.17.7.3, /rest/active-workflows verified to no longer
 *     400 on browser-id mismatch);
 *   - it's NOT HA's PWA service worker (still happens after
 *     unregister + cache clear);
 *   - it's NOT a header difference (replicating the EXACT axios headers
 *     from a manual XHR returns 200 with full data).
 *
 * The exact root cause inside n8n's middleware stack remains unclear,
 * but a single distinguishing factor reliably masks it: appending any
 * unique query parameter to the URL. The same XHR with `?_=<ts>` always
 * returns 200. We therefore wrap XMLHttpRequest.open() to append a
 * cache-buster on every GET to /rest/workflows/:id and
 * /rest/active-workflows. n8n's express ignores unknown query params,
 * so the workflow logic is unaffected. /rest/push (SSE), /rest/login,
 * binary-data and other endpoints are untouched.
 *
 * ---------------------------------------------------------------------
 * This file is served only inside the HA Ingress iframe, never on the
 * public webhooks/API port, so it cannot affect non-ingress traffic.
 */
(function () {
  var m = location.pathname.match(/^(\/api\/hassio_ingress\/[^/]+\/)/);
  if (!m) return;
  var _bp = m[1];

  // Fix 1: install <base href> as the very first child of <head>.
  try {
    var head = document.head || document.documentElement;
    if (!document.querySelector('base')) {
      var baseEl = document.createElement('base');
      baseEl.href = _bp;
      head.insertBefore(baseEl, head.firstChild);
    }
  } catch (e) { /* swallow — leave <base> absent */ }

  // Fix 2: pin window.BASE_PATH against n8n's own override.
  try {
    Object.defineProperty(window, 'BASE_PATH', {
      configurable: true,
      enumerable: true,
      get: function () { return _bp; },
      set: function (v) {
        if (v && typeof v === 'string' && v !== '/' && v !== _bp) {
          _bp = v;
        }
      }
    });
  } catch (e) { /* swallow — leave window.BASE_PATH untouched */ }

  // Fix 3: route /rest/workflows/<id> & /rest/active-workflows GETs
  // through fetch() instead of XMLHttpRequest, transparently. Verified
  // experimentally: a manual fetch() to the exact same URL with the
  // same headers and cookies in the same tab always returns 200 + JSON,
  // while axios's XHR returns 400 + 5-byte octet-stream + content-type
  // application/octet-stream. The triggering condition inside n8n's
  // middleware stack is unknown (not headers, not concurrency, not
  // conditional GET, not auth, not service worker — all ruled out via
  // DevTools), so we sidestep XHR entirely on the affected endpoints
  // by replacing the XMLHttpRequest constructor with a wrapper that
  // emulates the XHR API on top of fetch() for matched URLs and
  // delegates to the real XHR for everything else.
  try {
    var FAIL_RE = /\/rest\/(workflows\/[A-Za-z0-9_-]+|active-workflows)(\?|$)/;
    var Native = window.XMLHttpRequest;

    function FakeXHR() {
      var self = this;
      self.readyState = 0;
      self.status = 0;
      self.statusText = '';
      self.responseURL = '';
      self.responseType = '';
      self.timeout = 0;
      self.withCredentials = false;
      self.upload = { addEventListener: function () {}, removeEventListener: function () {}, dispatchEvent: function () { return true; } };

      var _response = '';
      var _responseText = '';
      var _respHeaders = '';
      var _respHeadersMap = new Map();
      var _aborted = false;
      var _method = 'GET';
      var _url = '';
      var _hdrs = {};

      var listeners = { readystatechange: [], load: [], loadstart: [], progress: [], abort: [], error: [], timeout: [], loadend: [] };
      self.onreadystatechange = null;
      self.onload = null;
      self.onloadend = null;
      self.onerror = null;
      self.ontimeout = null;
      self.onabort = null;
      self.onloadstart = null;
      self.onprogress = null;

      self.addEventListener = function (t, fn) { if (listeners[t]) listeners[t].push(fn); };
      self.removeEventListener = function (t, fn) {
        if (!listeners[t]) return;
        var i = listeners[t].indexOf(fn);
        if (i >= 0) listeners[t].splice(i, 1);
      };
      self.dispatchEvent = function () { return true; };

      function fire(t) {
        var ev = { type: t, target: self, currentTarget: self, bubbles: false, cancelable: false };
        (listeners[t] || []).slice().forEach(function (fn) { try { fn.call(self, ev); } catch (e) {} });
        var on = self['on' + t];
        if (typeof on === 'function') { try { on.call(self, ev); } catch (e) {} }
      }

      Object.defineProperty(self, 'response', { configurable: true, get: function () { return _response; } });
      Object.defineProperty(self, 'responseText', { configurable: true, get: function () { return _responseText; } });

      self.open = function (method, url) {
        _method = method;
        _url = url;
        _hdrs = {};
        self.readyState = 1;
        fire('readystatechange');
      };

      self.setRequestHeader = function (k, v) { _hdrs[k] = String(v); };
      self.overrideMimeType = function () {};
      self.getAllResponseHeaders = function () { return _respHeaders; };
      self.getResponseHeader = function (k) { return _respHeadersMap.get(String(k).toLowerCase()) || null; };
      self.abort = function () {
        _aborted = true;
        self.readyState = 4;
        fire('abort');
        fire('loadend');
      };

      self.send = function (body) {
        try {
          fetch(_url, {
            method: _method,
            credentials: 'include',
            headers: _hdrs,
            cache: 'no-store',
            body: body || undefined,
          }).then(function (r) {
            if (_aborted) return null;
            return r.text().then(function (txt) { return { r: r, txt: txt }; });
          }).then(function (out) {
            if (!out || _aborted) return;
            var r = out.r, txt = out.txt;
            self.status = r.status;
            self.statusText = r.statusText || (r.status === 200 ? 'OK' : '');
            self.responseURL = r.url;
            var hl = [];
            r.headers.forEach(function (v, k) {
              hl.push(k + ': ' + v);
              _respHeadersMap.set(k.toLowerCase(), v);
            });
            _respHeaders = hl.join('\r\n') + '\r\n';
            if (self.responseType === 'json') {
              try { _response = JSON.parse(txt); } catch (e) { _response = null; }
              _responseText = '';
            } else if (self.responseType === 'arraybuffer') {
              _response = new TextEncoder().encode(txt).buffer;
              _responseText = '';
            } else if (self.responseType === 'blob') {
              _response = new Blob([txt], { type: r.headers.get('content-type') || 'application/octet-stream' });
              _responseText = '';
            } else {
              _response = txt;
              _responseText = txt;
            }
            self.readyState = 2; fire('readystatechange');
            self.readyState = 3; fire('readystatechange');
            fire('progress');
            self.readyState = 4; fire('readystatechange');
            fire('load');
            fire('loadend');
          }).catch(function () {
            if (_aborted) return;
            self.status = 0;
            self.readyState = 4;
            fire('readystatechange');
            fire('error');
            fire('loadend');
          });
        } catch (e) {
          self.status = 0;
          self.readyState = 4;
          fire('error');
          fire('loadend');
        }
      };
    }

    function ProxyXHR() {
      var self = this;
      var real = new Native();
      var fake = null;
      var mode = null;
      var pending = {};

      function active() { return mode === 'fake' ? fake : real; }

      function defineProxy(prop) {
        Object.defineProperty(self, prop, {
          configurable: true,
          enumerable: true,
          get: function () { return mode === 'fake' ? fake[prop] : real[prop]; },
          set: function (v) {
            if (mode === 'fake') { fake[prop] = v; }
            else if (mode === 'real') { try { real[prop] = v; } catch (e) {} }
            else { pending[prop] = v; try { real[prop] = v; } catch (e) {} }
          }
        });
      }

      ['readyState','status','statusText','response','responseText','responseURL','responseType','responseXML','timeout','withCredentials','upload']
        .forEach(defineProxy);
      ['onreadystatechange','onload','onloadend','onerror','ontimeout','onabort','onloadstart','onprogress']
        .forEach(defineProxy);

      self.open = function (method, url) {
        if (typeof url === 'string' && (method === 'GET' || method === 'get') && FAIL_RE.test(url)) {
          mode = 'fake';
          fake = new FakeXHR();
          // Forward properties set before open()
          Object.keys(pending).forEach(function (p) { try { fake[p] = pending[p]; } catch (e) {} });
          return fake.open(method, url);
        }
        mode = 'real';
        return real.open.apply(real, arguments);
      };

      self.setRequestHeader = function (k, v) { return active().setRequestHeader(k, v); };
      self.send = function (b) { return mode === 'fake' ? fake.send(b) : real.send.apply(real, arguments); };
      self.abort = function () { return active().abort(); };
      self.getAllResponseHeaders = function () { return active().getAllResponseHeaders(); };
      self.getResponseHeader = function (k) { return active().getResponseHeader(k); };
      self.overrideMimeType = function (m) { return active().overrideMimeType(m); };
      self.addEventListener = function (t, fn, o) { return active().addEventListener(t, fn, o); };
      self.removeEventListener = function (t, fn, o) { return active().removeEventListener(t, fn, o); };
      self.dispatchEvent = function (e) { return active().dispatchEvent(e); };
    }

    ProxyXHR.UNSENT = 0;
    ProxyXHR.OPENED = 1;
    ProxyXHR.HEADERS_RECEIVED = 2;
    ProxyXHR.LOADING = 3;
    ProxyXHR.DONE = 4;
    ProxyXHR.prototype = Native.prototype;

    window.XMLHttpRequest = ProxyXHR;
  } catch (e) { /* swallow — leave XHR alone */ }
})();
</script>
