name: n8n
# Version format: {n8n_version}.{addon_build}
#   - first 3 digits track n8n upstream
#   - 4th digit is the addon build number (reset to 1 when n8n is bumped)
version: "2.18.5.3"
slug: n8n
description: n8n — Workflow Automation Platform (direct, no HA Ingress)
url: https://github.com/momohteks/hassio-n8n
# aarch64 temporarily disabled (see CLAUDE.md / CHANGELOG).
arch:
  - amd64
startup: application
boot: auto
# HA Ingress is intentionally disabled — n8n 2.x does not fully support
# being served under a sub-path (see upstream issue n8n-io/n8n#19437,
# maintainer statement: "N8N_PATH is not fully supported in the app").
# Expose port 5678 via your own reverse proxy on a dedicated subdomain
# (e.g. n8n.example.com) and point users there.
ports:
  5678/tcp: 5678
  8081/tcp: 8081
ports_description:
  5678/tcp: n8n UI + REST API + webhooks (use behind your reverse proxy)
  8081/tcp: Public webhooks only (no UI), firewall-friendly
map:
  - data:rw
options:
  webhook_url: ""
  timezone: "Europe/Paris"
schema:
  webhook_url: str?
  timezone: str
image: ghcr.io/momohteks/hassio-n8n-{arch}
