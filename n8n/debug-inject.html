<script>
/* hassio-n8n debug telemetry — injected by run.sh at startup.
   Android WebView inside the HA companion app silently drops
   sendBeacon() calls after the first one. So we always use
   `new Image().src` (GET) and serialise sends through a small
   queue (50ms gap) to avoid any coalescing/dropping. */
(function () {
  var BASE = (function () {
    var m = location.pathname.match(/^(\/api\/hassio_ingress\/[^/]+\/)/);
    return m ? m[1] : '/';
  })();

  /* --- Force window.BASE_PATH to the ingress URL and prevent any
     later code from setting it back to "/". Observed in the HA
     Android companion WebView: n8n's own code sets BASE_PATH="/"
     at DOMContentLoaded, causing every /rest/* XHR to resolve
     against the page origin (HA) instead of the ingress-proxied
     addon, returning 404. Regular browsers don't exhibit this.
     Fix: install a getter/setter BEFORE any other script runs. */
  if (BASE !== '/') {
    try {
      var _bp = BASE;
      Object.defineProperty(window, 'BASE_PATH', {
        configurable: true,
        enumerable: true,
        get: function () { return _bp; },
        set: function (v) {
          // Accept a replacement only if it's a non-empty path that
          // isn't the useless "/". Everything else is ignored and
          // reported for diagnostics.
          if (v && typeof v === 'string' && v !== '/' && v !== _bp) {
            _bp = v;
          } else {
            try {
              var q = 'ev=bp_set_ignored&v=' + encodeURIComponent(String(v));
              var i = new Image(); i.src = BASE + '__hassio_debug?' + q + '&_=' + Date.now();
            } catch (e) {}
          }
        }
      });
    } catch (e) {}
  }

  var Q = [];
  var draining = false;
  function drain() {
    if (!Q.length) { draining = false; return; }
    draining = true;
    var u = Q.shift();
    try {
      var i = new Image();
      i.src = u;
    } catch (e) { /* swallow */ }
    setTimeout(drain, 50);
  }
  function send(o) {
    try {
      var q = Object.keys(o).map(function (k) {
        return k + '=' + encodeURIComponent(String(o[k]).slice(0, 800));
      }).join('&');
      var u = BASE + '__hassio_debug?' + q + '&_=' + Date.now() + Math.random();
      Q.push(u);
      if (!draining) drain();
    } catch (e) { /* swallow */ }
  }
  function baseHref() {
    try {
      var b = document.querySelector('base');
      return (b && b.getAttribute('href')) || '';
    } catch (e) { return ''; }
  }
  function snap(ev) {
    send({
      ev: ev,
      BP: (typeof window.BASE_PATH !== 'undefined') ? String(window.BASE_PATH) : '__undef__',
      bURI: document.baseURI || '',
      base: baseHref()
    });
  }
  send({
    ev: 'boot',
    ua: navigator.userAgent,
    href: location.href,
    ref: document.referrer || '',
    cook: navigator.cookieEnabled ? 'y' : 'n',
    BP: (typeof window.BASE_PATH !== 'undefined') ? String(window.BASE_PATH) : '__undef__',
    bURI: document.baseURI || '',
    base: baseHref(),
    ingress: BASE
  });
  document.addEventListener('DOMContentLoaded', function () { snap('boot2'); });
  window.addEventListener('load', function () { snap('boot3'); });
  // And a 2-second delayed snapshot, in case BASE_PATH is set asynchronously
  // after the main bundle mounts.
  setTimeout(function () { snap('boot4'); }, 2000);
  setTimeout(function () { snap('boot5'); }, 5000);

  window.addEventListener('error', function (e) {
    send({
      ev: 'err',
      msg: e.message || '',
      src: e.filename || '',
      line: e.lineno || 0,
      col: e.colno || 0,
      stack: (e.error && e.error.stack) || ''
    });
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    var r = e.reason || {};
    send({
      ev: 'rej',
      msg: (r && r.message) || String(r) || '',
      stack: (r && r.stack) || ''
    });
  });
  var origFetch = window.fetch;
  if (origFetch) {
    window.fetch = function (input, init) {
      var url = (typeof input === 'string') ? input : (input && input.url) || '';
      var method = (init && init.method) || 'GET';
      send({ ev: 'fs', u: url, m: method });
      return origFetch.apply(this, arguments).then(function (r) {
        send({ ev: 'fd', u: url, s: r.status, ru: (r && r.url) || '' });
        return r;
      }, function (err) {
        send({ ev: 'ff', u: url, e: (err && err.message) || String(err) });
        throw err;
      });
    };
  }
  var OX = window.XMLHttpRequest;
  if (OX) {
    window.XMLHttpRequest = function () {
      var x = new OX();
      var U = '', M = '';
      var o = x.open;
      x.open = function (me, ur) { M = me; U = ur; return o.apply(x, arguments); };
      x.addEventListener('loadend', function () {
        send({ ev: 'xe', u: U, m: M, s: x.status, ru: x.responseURL || '' });
      });
      x.addEventListener('error', function () {
        send({ ev: 'xr', u: U, m: M });
      });
      return x;
    };
  }
})();
</script>
