user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log /dev/stdout main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # WebSocket / SSE upgrade handling (n8n real-time push)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream n8n_backend {
        server 127.0.0.1:5678;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Port 5678 — UI + REST API + webhooks (everything)
    #
    # No HA Ingress, no path prefix, no rewrites, no shim. Plain reverse
    # proxy. Point your reverse proxy (e.g. Nginx Proxy Manager) at
    # http://<HA-IP>:5678 from a dedicated subdomain like n8n.example.com.
    # -------------------------------------------------------------------------
    server {
        listen 5678;
        server_name _;

        location / {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host               $http_host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Host   $host;

            # WebSocket / SSE
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         $connection_upgrade;

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }
    }

    # -------------------------------------------------------------------------
    # Port 8081 — public webhooks and REST API only (no UI)
    # Useful if you want to expose webhooks publicly without exposing the UI.
    # -------------------------------------------------------------------------
    server {
        listen 8081;
        server_name _;

        location ~ ^/(webhook|webhook-test|webhook-waiting|form|form-test|form-waiting|rest|mcp|mcp-test)(/.*)?$ {
            proxy_pass         http://n8n_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }

        location / {
            return 403 "Forbidden. Use the UI subdomain (port 5678).";
        }
    }
}
