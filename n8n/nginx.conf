user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log /dev/stdout main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # WebSocket upgrade handling (for n8n real-time push)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream n8n_backend {
        server 127.0.0.1:5680;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Port 5690 — Home Assistant Ingress → n8n UI
    #
    # Since 2.16.1.16 we use n8n's native N8N_PATH mechanism with the real
    # ingress URL from the HA Supervisor API (see run.sh). n8n bakes the
    # correct absolute URL prefix into all of its JS/CSS/HTML assets at
    # startup, so nginx doesn't need ANY URL rewriting, sub_filter, header
    # injection, or prefix mapping here — just a plain HTTP reverse proxy.
    # -------------------------------------------------------------------------
    server {
        listen 5690;
        server_name _;

        # Block any Service Worker file from being served. n8n 2.17 ships a
        # SW that corrupts /rest/* responses under the ever-changing HA
        # ingress token scope (see base-path-fix.html for the full story).
        # Returning 404 here prevents the browser from ever (re)installing
        # or updating the SW. Existing SWs are unregistered client-side.
        location ~* ^.*/(sw|service-worker|workbox-[^/]*)\.js$ {
            add_header Cache-Control "no-store" always;
            return 404;
        }

        location / {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host               $http_host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Host   $host;

            # WebSocket / SSE (n8n real-time push)
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         $connection_upgrade;

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }
    }

    # -------------------------------------------------------------------------
    # Port 8081 — Public webhooks and REST API (no Ingress)
    # Only webhook/form/API paths are proxied; everything else is 403.
    # -------------------------------------------------------------------------
    server {
        listen 8081;
        server_name _;

        location ~ ^/(webhook|webhook-test|webhook-waiting|form|form-test|form-waiting|rest|mcp|mcp-test)(/.*)?$ {
            proxy_pass         http://n8n_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }

        location / {
            return 403 "Forbidden. Use Home Assistant Ingress for the UI.";
        }
    }
}
