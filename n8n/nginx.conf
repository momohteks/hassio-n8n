user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Access log includes the effective ingress prefix used on each request,
    # so setup problems ("prefix came through empty") are trivially visible.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" ingress_prefix="$ingress_prefix"';

    access_log /dev/stdout main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    upstream n8n_backend {
        server 127.0.0.1:5680;
        keepalive 32;
    }

    # WebSocket upgrade handling (sub_filter + upgrade cohabitation)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------------
    # Ingress prefix resolution, fallback chain:
    #   1. X-Forwarded-Prefix (set by external reverse proxy, matches the
    #      URL the *browser* actually sees — this wins because it's the
    #      only value guaranteed to match what the browser requests back).
    #   2. X-Ingress-Path (set by HA Core native Ingress, e.g.
    #      /api/hassio_ingress/<token>).
    # If both are missing the <head>-injected JS shim below derives the
    # prefix from window.location at runtime in the browser.
    # -------------------------------------------------------------------------
    map $http_x_forwarded_prefix $ingress_prefix {
        default $http_x_forwarded_prefix;
        ""      $http_x_ingress_path;
    }

    # -------------------------------------------------------------------------
    # Port 5678 — Home Assistant Ingress → n8n UI
    #
    # n8n is started with N8N_PATH=/hassio-n8n-prefix/ so it bakes this
    # static marker into every HTML/JS/CSS file at startup. nginx then
    # rewrites the marker back to the real ingress prefix in the response
    # body, using sub_filter. As a safety net, we also inject a tiny JS
    # shim into <head> that patches fetch/XHR/WebSocket to replace any
    # stray marker with the prefix derived from window.location at
    # runtime — so even if sub_filter misses a chunk (weird MIME, etc.)
    # the browser rewrites the URL itself.
    # -------------------------------------------------------------------------
    server {
        listen 5678;
        server_name _;

        # sub_filter needs uncompressed upstream responses
        gzip off;

        # n8n applies express compression() middleware globally — it gzips
        # responses whenever Accept-Encoding lets it. `gunzip on` makes nginx
        # transparently decompress any gzipped upstream response BEFORE
        # sub_filter runs on the body, as a safety net in case our
        # `Accept-Encoding: identity` header gets overridden somewhere.
        gunzip on;

        # Expose the resolved ingress prefix as a response header so it can
        # be checked in the browser DevTools Network tab.
        add_header X-Ingress-Prefix "$ingress_prefix" always;

        # Bigger proxy buffers so sub_filter reliably streams large .mjs
        # bundles (n8n editor bundles can be 1-2 MB minified).
        proxy_buffer_size   16k;
        proxy_buffers       16 16k;
        proxy_busy_buffers_size 32k;

        location / {
            # Backend routes (/, /rest, /rest/push, static) are all mounted
            # at '/' in n8n's Express server regardless of N8N_PATH — proxy
            # the path through unchanged.
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix $ingress_prefix;

            # WebSocket (n8n real-time push)
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         $connection_upgrade;

            # Tell upstream (n8n's express compression() middleware) we only
            # accept identity encoding. Combined with `gunzip on` above this
            # guarantees sub_filter sees plain text.
            proxy_set_header   Accept-Encoding    "identity";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # CSP would block asset URLs we rewrite
            proxy_hide_header  Content-Security-Policy;
            proxy_hide_header  Content-Security-Policy-Report-Only;

            # Rewrite any Location: header that points back to the marker
            proxy_redirect     /hassio-n8n-prefix/ $ingress_prefix/;

            # ---- Response body rewriting --------------------------------
            # Apply sub_filter to EVERY response content type. n8n serves
            # JS chunks as text/javascript (not application/javascript),
            # plus .mjs, .css, HTML — the wildcard covers them all.
            sub_filter_once off;
            sub_filter_types *;

            # 1) Replace the static marker with the real ingress prefix
            #    (whatever sub_filter can match — covers all text bodies).
            sub_filter '/hassio-n8n-prefix/' '$ingress_prefix/';

            # 1b) Also rewrite the raw Vite placeholder. n8n's startup
            #     compile step (packages/cli/src/commands/start.ts) only
            #     matches `.js` and `.css` via regex /(index\.html)|.*\.(js|css)/,
            #     so `.mjs` chunks keep the literal `/{{BASE_PATH}}/` marker
            #     and their dynamic imports 404 ("Could not fetch node types").
            #     We rewrite it the same way as the static marker.
            sub_filter '/{{BASE_PATH}}/' '$ingress_prefix/';

            # 2) Inject a JS shim right before </head>. It runs AFTER
            #    /static/base-path.js has executed (where n8n sets
            #    window.BASE_PATH, which is the SOLE source of truth used
            #    by Vue Router, Axios baseUrl, asset loaders, etc.).
            #    The shim:
            #      a) Overrides window.BASE_PATH with a value derived from
            #         the real runtime URL, if base-path.js still holds the
            #         raw marker or an empty value (sub_filter miss /
            #         empty prefix).
            #      b) Wraps fetch/XHR/WebSocket so any URL still containing
            #         the marker gets rewritten to the real prefix — last
            #         line of defence for JS chunks loaded after page init.
            # NOTE: the JS below avoids any "$" character — nginx tries to
            # interpolate it as a variable in sub_filter values, which would
            # fail the config load. Trailing-slash stripping is done with a
            # while-loop instead of a /\/+$/ regex for the same reason.
            # NOTE: m2 is built from concatenated pieces so sub_filter above
            # doesn't rewrite the shim itself (it looks for the contiguous
            # bytes `/{{BASE_PATH}}/`, which never appear contiguously here).
            sub_filter '</head>' '<script>(function(){var m1="/hassio-n8n-prefix/";var m2="/"+"{{BASE_PATH}}"+"/";var cur=window.BASE_PATH||"";var pn=window.location.pathname;var base;if(cur&&cur.indexOf(m1)<0&&cur.indexOf(m2)<0&&cur!=="/"&&cur!==""){base=cur}else{var pref="/api/hassio_ingress/";if(pn.indexOf(pref)===0){var rest=pn.slice(pref.length);var sl=rest.indexOf("/");base=sl>0?pref+rest.slice(0,sl+1):pn}else{base=pn}}while(base.length>1&&base.charAt(base.length-1)==="/"){base=base.slice(0,-1)}if(!base||base==="/"){base=""}var real=base+"/";window.BASE_PATH=real;try{console.log("[hassio-n8n] BASE_PATH",real,"cur",cur,"pn",pn)}catch(e){}var rw=function(u){if(typeof u!=="string")return u;if(u.indexOf(m1)===0)return real+u.slice(m1.length);if(u.indexOf(m2)===0)return real+u.slice(m2.length);return u};var of=window.fetch;if(of)window.fetch=function(u,o){return of.call(this,rw(u),o)};var ox=XMLHttpRequest.prototype.open;XMLHttpRequest.prototype.open=function(){arguments[1]=rw(arguments[1]);return ox.apply(this,arguments)};var ow=window.WebSocket;if(ow){var NW=function(u,p){return new ow(rw(u),p)};NW.prototype=ow.prototype;for(var k in ow){try{NW[k]=ow[k]}catch(e){}}window.WebSocket=NW}})();</script></head>';
        }
    }

    # -------------------------------------------------------------------------
    # Port 8081 — Public webhooks and REST API (no Ingress, served at root)
    # Raw HTTP clients, no frontend prefix rewriting needed — pass through.
    # -------------------------------------------------------------------------
    server {
        listen 8081;
        server_name _;

        location /webhook/ {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /webhook-waiting/ {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /rest/ {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Block everything else on the public port
        location / {
            return 403 "Forbidden. Use Home Assistant Ingress for the UI.";
        }
    }
}
