user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Upstream partagé
    upstream n8n_backend {
        server 127.0.0.1:5680;
        keepalive 32;
    }

    # Map pour gérer correctement l'upgrade WebSocket vs sub_filter
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------------
    # Port 5678 — Ingress Home Assistant → UI n8n
    # Le préfixe de chemin est dynamique (ex : /bace4c61_n8n/) et transmis par
    # HA via le header X-Ingress-Path. n8n produit des URLs absolues qui
    # ignorent ce préfixe → on les réécrit à la volée avec sub_filter.
    # -------------------------------------------------------------------------
    server {
        listen 5678;
        server_name _;

        # sub_filter ne fonctionne pas sur une réponse compressée
        gzip off;

        location / {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;

            # Headers standard
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            # Préfixe Ingress transmis à n8n (au cas où il le gère nativement)
            proxy_set_header   X-Forwarded-Prefix $http_x_ingress_path;

            # WebSocket (UI push temps réel n8n)
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         $connection_upgrade;

            # Désactive la compression amont pour que sub_filter puisse lire
            # les réponses en clair
            proxy_set_header   Accept-Encoding    "";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Empêche n8n de renvoyer un CSP qui casserait les URLs réécrites
            proxy_hide_header  Content-Security-Policy;
            proxy_hide_header  Content-Security-Policy-Report-Only;

            # ---- Réécriture des URLs absolues avec le préfixe HA Ingress ----
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript application/json;

            # Attributs HTML classiques
            sub_filter 'href="/'           'href="$http_x_ingress_path/';
            sub_filter 'src="/'            'src="$http_x_ingress_path/';
            sub_filter 'action="/'         'action="$http_x_ingress_path/';
            # Injection d'une <base> pour que les URLs relatives le soient au préfixe
            sub_filter '<head>'            '<head><base href="$http_x_ingress_path/">';

            # Chemins spécifiques n8n dans les bundles JS et JSON
            sub_filter '"/rest/'           '"$http_x_ingress_path/rest/';
            sub_filter '"/assets/'         '"$http_x_ingress_path/assets/';
            sub_filter '"/webhook/'        '"$http_x_ingress_path/webhook/';
            sub_filter '"/webhook-test/'   '"$http_x_ingress_path/webhook-test/';
            sub_filter '"/webhook-waiting/' '"$http_x_ingress_path/webhook-waiting/';
            sub_filter '"/types/'          '"$http_x_ingress_path/types/';
            sub_filter '"/static/'         '"$http_x_ingress_path/static/';
            sub_filter '"/push'            '"$http_x_ingress_path/push';
            sub_filter '"/form/'           '"$http_x_ingress_path/form/';

            # Références CSS url(...)
            sub_filter 'url(/assets/'      'url($http_x_ingress_path/assets/';
            sub_filter 'url("/assets/'     'url("$http_x_ingress_path/assets/';
        }
    }

    # -------------------------------------------------------------------------
    # Port 8081 — Webhooks et API REST n8n (accès public, sans Ingress)
    # Ici on ne réécrit rien : le chemin est à la racine publique.
    # -------------------------------------------------------------------------
    server {
        listen 8081;
        server_name _;

        location /webhook/ {
            proxy_pass         http://n8n_backend/webhook/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /webhook-waiting/ {
            proxy_pass         http://n8n_backend/webhook-waiting/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /rest/ {
            proxy_pass         http://n8n_backend/rest/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Bloquer le reste (pas d'accès à l'UI via le port webhook)
        location / {
            return 403 "Acces interdit. Utilisez l'Ingress Home Assistant pour l'interface.";
        }
    }
}
