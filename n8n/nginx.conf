user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # -------------------------------------------------------------------------
    # Port 5678 — Ingress Home Assistant → UI n8n
    # -------------------------------------------------------------------------
    server {
        listen 5678;
        server_name _;

        location / {
            proxy_pass         http://127.0.0.1:5680;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (n8n utilise des WebSockets pour l'UI en temps réel)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # -------------------------------------------------------------------------
    # Port 8081 — Webhooks et API REST n8n (accès public)
    # -------------------------------------------------------------------------
    server {
        listen 8081;
        server_name _;

        # Uniquement les routes webhook et API
        location /webhook/ {
            proxy_pass         http://127.0.0.1:5680/webhook/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /webhook-waiting/ {
            proxy_pass         http://127.0.0.1:5680/webhook-waiting/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /rest/ {
            proxy_pass         http://127.0.0.1:5680/rest/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Bloquer le reste (pas d'accès à l'UI via le port webhook)
        location / {
            return 403 "Accès interdit. Utilisez l'Ingress Home Assistant pour l'interface.";
        }
    }
}
