user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    upstream n8n_backend {
        server 127.0.0.1:5680;
        keepalive 32;
    }

    # WebSocket upgrade handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------------
    # Port 5678 — Home Assistant Ingress → n8n UI
    #
    # Pattern "static placeholder + runtime rewrite":
    # - n8n is started with N8N_PATH=/hassio-n8n-prefix/ so it bakes this
    #   prefix into every frontend asset (Vite's BASE_PATH placeholder).
    # - HA Ingress strips its dynamic prefix before forwarding, so we
    #   re-add /hassio-n8n-prefix/ to every incoming request before
    #   proxying to n8n — that way n8n's backend routes match.
    # - In responses, we rewrite the literal /hassio-n8n-prefix/ back to
    #   $http_x_ingress_path/ so the browser's URLs match what HA serves.
    # This works for HTML, JS, CSS, JSON — everything n8n serves — with a
    # single global rewrite rule instead of fragile per-path sub_filters.
    # -------------------------------------------------------------------------
    server {
        listen 5678;
        server_name _;

        # sub_filter needs uncompressed upstream responses
        gzip off;

        location / {
            # NOTE: no incoming rewrite — n8n's backend mounts EVERY route
            # at '/' regardless of N8N_PATH (verified in server.ts: static
            # files on '/', /rest/... on '/rest', push on '/rest/push').
            # N8N_PATH only affects frontend bundle text replacement, so we
            # just proxy the path through and let sub_filter fix the
            # references in the response.
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Prefix $http_x_ingress_path;

            # WebSocket (n8n real-time push)
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         $connection_upgrade;

            # Disable upstream compression so sub_filter can read the body
            proxy_set_header   Accept-Encoding    "";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # CSP would block asset URLs we rewrite
            proxy_hide_header  Content-Security-Policy;
            proxy_hide_header  Content-Security-Policy-Report-Only;

            # Rewrite any Location: header that points back to the static prefix
            proxy_redirect     /hassio-n8n-prefix/ $http_x_ingress_path/;

            # ---- Single sub_filter: static marker → real Ingress prefix ----
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript application/json;
            sub_filter '/hassio-n8n-prefix/' '$http_x_ingress_path/';
        }
    }

    # -------------------------------------------------------------------------
    # Port 8081 — Public webhooks and REST API (no Ingress, served at root)
    # The frontend prefix injection does NOT apply here — these are raw API
    # calls, so we re-add the static prefix so n8n's routes match, but we
    # do NOT sub_filter anything (JSON payloads should be untouched).
    # -------------------------------------------------------------------------
    server {
        listen 8081;
        server_name _;

        location /webhook/ {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /webhook-waiting/ {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /rest/ {
            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Block everything else on the public port
        location / {
            return 403 "Forbidden. Use Home Assistant Ingress for the UI.";
        }
    }
}
